<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applications | LIMCOMA Admin</title>
    <link rel="shortcut icon" href="../images/limcoma logoo.png"
      type="image/x-icon" />
    <link rel="stylesheet" href="admin.css" />
    <style>
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .detail-label {
            font-size: 0.78rem;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .detail-value {
            font-size: 0.92rem;
            color: #222;
            margin-top: 2px;
        }
        
        .section-head {
            font-weight: bold;
            color: #15355a;
            font-size: 0.9rem;
            margin: 14px 0 8px;
            border-bottom: 1px solid #dce4ed;
            padding-bottom: 4px;
        }
        
        @media print {
            .modal-overlay {
                display: flex !important;
                position: static;
                background: none;
                padding: 0;
            }
            .modal-box {
                box-shadow: none;
                max-height: none;
            }
            .modal-header,
            .modal-footer,
            .topbar,
            .sidebar,
            .toolbar,
            .card:not(#printCard),
            .page-title {
                display: none !important;
            }
            .main {
                margin: 0;
                padding: 0;
            }
            #printCard {
                display: block !important;
            }
        }
        
        @media print {
            /* Hide everything except the view modal content */
            .topbar,
            .sidebar,
            .toolbar,
            .page-title,
            .card:not(#printTarget),
            #alertBox,
            .modal-footer,
            .modal-header,
            .modal-overlay:not(#viewModal) {
                display: none !important;
            }
            /* Make the view modal render like a normal page */
            .modal-overlay#viewModal {
                position: static !important;
                background: none !important;
                display: block !important;
                padding: 0 !important;
            }
            .modal-box {
                box-shadow: none !important;
                max-height: none !important;
                max-width: 100% !important;
                border-radius: 0 !important;
            }
            .main {
                margin: 0 !important;
                padding: 0 !important;
            }
            body {
                background: #fff !important;
            }
            /* Hide browser URL / header / footer */
            @page {
                margin: 12mm;
                size: A4;
            }
        }
    </style>
  </head>

  <body>

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-brand">
        <img src="../images/limcoma logoo.png" alt="Logo" /> LIMCOMA Admin Panel
      </div>
      <div class="topbar-right">
        <span id="adminName">Admin</span>
        <button class="btn-logout" onclick="adminLogout()">Logout</button>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section">Main</div>
      <a href="dashboard.html"><span class="ico">&#9632;</span> Dashboard</a>
      <a href="applications.html" class="active"><span
          class="ico">&#128196;</span> Applications</a>
      <a href="users.html"><span class="ico">&#128100;</span> Users</a>
      <div class="sidebar-section admin-only" style="display:none;">Admin</div>
      <a href="subadmins.html" class="admin-only" style="display:none;"><span
          class="ico">&#128272;</span> Admin
        Accounts</a>
      <div class="sidebar-section">Site</div>
      <a href="../index.html" target="_blank"><span class="ico">&#127760;</span>
        Main Site</a>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="page-title">Membership Applications</div>

      <!-- Toolbar -->
      <div class="toolbar no-print">
        <input type="text" id="searchInput"
          placeholder="Search by name or email..." style="min-width:220px;" />
        <select id="statusFilter">
          <option value>All Status</option>
          <option value="Approved">Approved</option>
          <option value="Incomplete">Incomplete</option>
        </select>
        <button class="btn btn-primary"
          onclick="loadApplications()">Search</button>
      </div>

      <div id="alertBox"></div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Submitted</th>
                <th style="min-width:220px;">Actions</th>
              </tr>
            </thead>
            <tbody id="appTbody">
              <tr>
                <td colspan="7"
                  style="text-align:center;padding:20px;color:#888;">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── VIEW MODAL ─────────────────────────────────────────── -->
    <div class="modal-overlay" id="viewModal">
      <div class="modal-box" style="max-width:780px;">
        <div class="modal-header">
          <span>Application Details</span>
          <button class="modal-close"
            onclick="closeModal('viewModal')">&#x2715;</button>
        </div>
        <div class="modal-body" id="viewBody">Loading...</div>
        <div class="modal-footer">
          <button class="btn btn-secondary"
            onclick="closeModal('viewModal')">Close</button>
          <button class="btn btn-primary"
            onclick="window.open('api/admin_export_pdf.php?id=' + currentViewId + '&mode=print', '_blank')">Print</button>
          <button class="btn btn-success"
            onclick="window.open('api/admin_export_pdf.php?id=' + currentViewId + '&mode=pdf', '_blank')">Export
            as PDF</button>
        </div>
      </div>
    </div>

    <!-- ── STATUS MODAL ───────────────────────────────────────── -->
    <div class="modal-overlay" id="statusModal">
      <div class="modal-box" style="max-width:440px;">
        <div class="modal-header">
          <span>Update Application Status</span>
          <button class="modal-close"
            onclick="closeModal('statusModal')">&#x2715;</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="statusAppId" />
          <div class="form-group">
            <label>Status</label>
            <select id="statusSelect" class="form-control">
              <option value="Approved">Approved</option>
              <option value="Incomplete">Incomplete</option>
            </select>
          </div>
          <div class="form-group">
            <label>Admin Notes (optional)</label>
            <textarea id="statusNotes" class="form-control" rows="3"
              placeholder="Add notes about this decision..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary"
            onclick="closeModal('statusModal')">Cancel</button>
          <button class="btn btn-primary" onclick="submitStatus()">Save
            Status</button>
        </div>
      </div>
    </div>

    <!-- ── EDIT MODAL ─────────────────────────────────────────── -->
    <div class="modal-overlay" id="editModal">
      <div class="modal-box" style="max-width:680px;">
        <div class="modal-header">
          <span>Edit Application Info</span>
          <button class="modal-close"
            onclick="closeModal('editModal')">&#x2715;</button>
        </div>
        <div class="modal-body" id="editBody">Loading...</div>
        <div class="modal-footer">
          <button class="btn btn-secondary"
            onclick="closeModal('editModal')">Cancel</button>
          <button class="btn btn-primary" onclick="submitEdit()">Save
            Changes</button>
        </div>
      </div>
    </div>

    <script>
        let currentRole = "";
        let currentEditId = 0;
        let currentViewId = 0; // ← ADD THIS LINE

        (async function init() {
            const me = await (await fetch("api/admin_me.php", {
                credentials: "include"
            })).json();
            if (!me.ok) {
                window.location.href = "login.html";
                return;
            }

            currentRole = me.role;
            document.getElementById("adminName").textContent = me.username + " (" + me.role + ")";

            if (me.role === "admin") {
                document.querySelectorAll(".admin-only").forEach(el => el.style.display = "");
            }

            // Check URL for ?view=ID
            const params = new URLSearchParams(location.search);
            const viewId = params.get("view");

            await loadApplications();

            if (viewId) openView(parseInt(viewId));
        })();

        async function loadApplications() {
            const search = document.getElementById("searchInput").value.trim();
            const status = document.getElementById("statusFilter").value;
            const exportBtn = document.getElementById("exportBtn");

            let url = "api/admin_applications.php?action=list";
            if (search) url += "&search=" + encodeURIComponent(search);
            if (status) url += "&status=" + encodeURIComponent(status);

            // Update export link only if button exists
            if (exportBtn) {
                exportBtn.href = "api/admin_export.php" + (status ? "?status=" + encodeURIComponent(status) : "");
            }

            const r = await fetch(url, {
                credentials: "include"
            });
            const data = await r.json();

            const tbody = document.getElementById("appTbody");

            if (!data.ok || !data.data.length) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;color:#888;">No applications found.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.data.map((row, index) => `
     <tr>
        <td>${index + 1}</td>
        <td>${esc(row.first_name || "")} ${esc(row.last_name || "")}</td>
        <td>${esc(row.email || "")}</td>
        <td>${esc(row.phone || "")}</td>
        <td><span class="badge ${row.status ? 'badge-' + row.status.toLowerCase() : ''}">${row.status || '—'}</span></td>
        <td>${row.submitted_at ? row.submitted_at.slice(0, 10) : ""}</td>
        <td>
         <button class="btn btn-info btn-sm" onclick="openView(${row.id})">View</button>
         <button class="btn btn-warning btn-sm" onclick="openStatus(${row.id}, '${row.status}')">Status</button>
         <button class="btn btn-primary btn-sm" onclick="openEdit(${row.id})">Edit</button>
         ${currentRole === "admin" ? `<button class="btn btn-danger btn-sm" onclick="deleteApp(${row.id})">Delete</button>` : ""}
        </td>
      </tr>
    `).join("");
    }

    function exportPDF() {
      const status = document.getElementById("statusFilter").value;
      // Opens a printable list — for single record PDF use the View modal's Print button
      alert("To export a PDF for a specific member, click View → then Print.\n\nFor a full list, use your browser's Print function on this page.");
    }

    // ── VIEW ────────────────────────────────────────────────
    async function openView(id) {
      currentViewId = id;  // ← ADD THIS LINE
      openModal("viewModal");
      document.getElementById("viewBody").innerHTML = "Loading...";

      const r = await fetch("api/admin_applications.php?action=view&id=" + id, { credentials: "include" });
      const data = await r.json();

      if (!data.ok) {
        document.getElementById("viewBody").innerHTML = "<p style='color:red;'>Error loading data.</p>";
        return;
      }

      const d = data.data;
      const f = d.form_data || {};

      const photo = d.photo_path
        ? `<img src="../${d.photo_path}" style="width:90px;height:110px;object-fit:cover;border:1px solid #ccc;" />`
        : `<div style="width:90px;height:110px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#888;">No Photo</div>`;

      document.getElementById("viewBody").innerHTML = `
      <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:16px;">
        ${photo}
        <div>
          <div style="font-size:1.1rem;font-weight:bold;">${esc((f.first_name || d.first_name || "") + " " + (f.last_name || d.last_name || ""))}</div>
          <div style="color:#666;font-size:0.88rem;">${esc(d.email || "")}</div>
          <div style="margin-top:8px;"><span class="badge badge-${d.status.toLowerCase()}">${d.status}</span></div>
          <div style="font-size:0.82rem;color:#888;margin-top:6px;">Submitted: ${d.submitted_at ? d.submitted_at.slice(0, 10) : ""}</div>
          ${d.admin_notes ? `<div style="margin-top:8px;font-size:0.85rem;"><b>Notes:</b> ${esc(d.admin_notes)}</div>` : ""}
        </div>
      </div>

      <div class="section-head">Personal Information</div>
      <div class="detail-grid">
        ${field("Application Type", f.application_type)}
        ${field("Last Name", f.last_name || d.last_name)}
        ${field("First Name", f.first_name || d.first_name)}
        ${field("Middle Name", f.middle_name)}
        ${field("Home Address", f.home_address)}
        ${field("Gender", f.gender)}
        ${field("Religion", f.religion)}
        ${field("Birthdate", f.birthdate)}
        ${field("Age", f.age)}
        ${field("Civil Status", f.civil_status)}
        ${field("Dependents", f.dependents)}
        ${field("Education", f.education)}
      </div>

      <div class="section-head">Contact & Work</div>
      <div class="detail-grid">
        ${field("Mobile", f.mobile || d.phone)}
        ${field("Telephone", f.telephone)}
        ${field("Email", f.email || d.email)}
        ${field("Facebook Profile", f.facebook_link)}
        ${field("TIN", f.tin)}
        ${field("Livelihood", f.livelihood)}
        ${field("Gross Monthly Income", f.gross_monthly_income)}
        ${field("Work Address", f.work_address)}
        ${field("OFW Country", f.ofw_country)}
        ${field("OFW Work", f.ofw_work)}
        ${field("OFW Years Abroad", f.ofw_years)}
      </div>

      <div class="section-head">Family</div>
      <div class="detail-grid">
        ${field("Spouse Name", f.spouse_name)}
        ${field("Spouse Occupation", f.spouse_occupation)}
        ${field("Father's Name", f.father_name)}
        ${field("Father's Occupation", f.father_occupation)}
        ${field("Mother's Name", f.mother_name)}
        ${field("Mother's Occupation", f.mother_occupation)}
      </div>

      <div class="section-head">Beneficiaries</div>
      <div class="detail-grid">
        ${field("Beneficiary 1", f.benef_name_1 ? f.benef_name_1 + " (" + f.benef_relation_1 + ") " + f.benef_alloc_1 + "%" : "")}
        ${field("Beneficiary 2", f.benef_name_2 ? f.benef_name_2 + " (" + f.benef_relation_2 + ") " + f.benef_alloc_2 + "%" : "")}
        ${field("Beneficiary 3", f.benef_name_3 ? f.benef_name_3 + " (" + f.benef_relation_3 + ") " + f.benef_alloc_3 + "%" : "")}
        ${field("Beneficiary 4", f.benef_name_4 ? f.benef_name_4 + " (" + f.benef_relation_4 + ") " + f.benef_alloc_4 + "%" : "")}
      </div>

      <div class="section-head">Products / Services</div>
      <div class="detail-grid">
        ${field("Avails Feeds", f.avail_feeds ? "Yes" : "No")}
        ${field("Avails Loans", f.avail_loans ? "Yes" : "No")}
        ${field("Avails Savings", f.avail_savings ? "Yes" : "No")}
        ${field("Avails Time Deposit", f.avail_time_deposit ? "Yes" : "No")}
        ${field("Currently Using Feeds", f.using_feeds_now)}
        ${field("Feeds Brand", f.feeds_brand)}
      </div>

      <div class="section-head">Livestock (Feeds Details)</div>
      <div class="detail-grid">
        ${field("Baboy - Sow", f.baboy_sow)}
        ${field("Baboy - Piglet", f.baboy_piglet)}
        ${field("Baboy - Boar", f.baboy_boar)}
        ${field("Baboy - Grower", f.baboy_grower)}
        ${field("Manok - Patilugin", f.manok_patilugin)}
        ${field("Manok - Broiler", f.manok_broiler)}
        ${field("Iba pang Alaga", f.iba_pang_alaga)}
      </div>

      <div class="section-head">Agreements</div>
      <div class="detail-grid">
        ${field("Subscription Agreement", f.subscription_agreement_accepted === "1" ? "Accepted" : "Not Accepted")}
        ${field("Kasunduan / Capital Agreement", f.kasunduan_accepted === "1" ? "Accepted" : "Not Accepted")}
      </div>

      <div class="section-head">Signature</div>
      <div style="margin-bottom:10px;">
        ${f.signature_file
          ? `<div style="margin-bottom:6px;"><strong>Signature Image:</strong></div>
             <img src="../${esc(f.signature_file)}" style="max-width:260px;max-height:100px;border:1px solid #ccc;padding:4px;display:block;" />`
          : field("Signature (Typed Name)", f.signature)}
      </div>
      ${field("Signature Date", f.signature_date)}

      ${(function(){
        const cl = (f.checklist_files && typeof f.checklist_files === 'object') ? f.checklist_files : {};
        const keys = Object.keys(cl);
        if (!keys.length) return '';
        const labels = {
          a1:"Associate: Application Form", a2:"Associate: 2x2 Photo",
          a3:"Associate: Gov't ID",         a4:"Associate: Birth/Marriage Cert",
          r1:"Regular: Application Form",   r2:"Regular: 2x2 Photo",
          r3:"Regular: Gov't ID",           r4:"Regular: Share Capital Proof",
          r5:"Regular: ID Fee Proof"
        };
        let html = '<div class="section-head">Checklist Uploaded Files</div><div class="detail-grid">';
        keys.forEach(function(k){
          const path = cl[k];
          const label = labels[k] || k;
          const ext = path.split('.').pop().toLowerCase();
          const isPdf = ext === 'pdf';
          html += '<div class="detail-item"><div class="detail-label">' + esc(label) + '</div><div class="detail-value">';
          if (isPdf) {
            html += '<a href="../' + esc(path) + '" target="_blank">📄 View PDF</a>';
          } else {
            html += '<a href="../' + esc(path) + '" target="_blank"><img src="../' + esc(path) + '" style="max-width:110px;max-height:80px;border:1px solid #ccc;display:block;" /></a>';
          }
          html += '</div></div>';
        });
        html += '</div>';
        return html;
      })()}
    `;
    }

    function field(label, value) {
      return `<div class="detail-item">
      <div class="detail-label">${label}</div>
      <div class="detail-value">${value !== undefined && value !== null && value !== "" ? esc(String(value)) : '<span style="color:#bbb;">—</span>'}</div>
    </div>`;
    }

    function printModal() {
      window.print();
    }

    // ── STATUS ──────────────────────────────────────────────
    function openStatus(id, currentStatus) {
      document.getElementById("statusAppId").value = id;
      document.getElementById("statusSelect").value = currentStatus;
      document.getElementById("statusNotes").value = "";
      openModal("statusModal");
    }

    async function submitStatus() {
      const id = parseInt(document.getElementById("statusAppId").value);
      const status = document.getElementById("statusSelect").value;
      const notes = document.getElementById("statusNotes").value;

      const r = await post("api/admin_applications.php?action=update_status", { id, status, admin_notes: notes });
      const data = await r.json();

      if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
      closeModal("statusModal");
      showAlert("Status updated successfully.", "success");
      loadApplications();
    }

    // ── EDIT ────────────────────────────────────────────────
    async function openEdit(id) {
      openModal("editModal");
      currentEditId = id;
      document.getElementById("editBody").innerHTML = "Loading...";

      const r = await fetch("api/admin_applications.php?action=view&id=" + id, { credentials: "include" });
      const data = await r.json();

      if (!data.ok) { document.getElementById("editBody").innerHTML = "<p style='color:red;'>Error.</p>"; return; }

      const d = data.data;
      const f = d.form_data || {};

      document.getElementById("editBody").innerHTML = `
      <style>
        .edit-section { font-weight:bold; color:#15355a; font-size:0.9rem; margin:16px 0 8px; border-bottom:1px solid #dce4ed; padding-bottom:4px; }
        .edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .edit-grid .full { grid-column: 1 / -1; }
        .ef label { display:block; font-size:0.8rem; font-weight:bold; color:#444; margin-bottom:3px; }
        .ef input, .ef select, .ef textarea { width:100%; padding:7px 9px; border:1px solid #ccc; border-radius:4px; font-size:0.88rem; }
        .ef textarea { resize:vertical; }
        .radio-row { display:flex; gap:14px; flex-wrap:wrap; padding-top:4px; }
        .radio-row label { font-weight:normal; display:flex; align-items:center; gap:4px; }
      </style>

      <!-- PERSONAL -->
      <div class="edit-section">Personal Information</div>
      <div class="edit-grid">
        <div class="ef"><label>Application Type</label>
          <select id="ef_application_type">
            <option value="">Select</option>
            <option value="Associate" ${f.application_type === "Associate" ? "selected" : ""}>Associate</option>
            <option value="Regular" ${f.application_type === "Regular" ? "selected" : ""}>Regular</option>
            <option value="Transfer to Regular" ${f.application_type === "Transfer to Regular" ? "selected" : ""}>Transfer to Regular</option>
          </select>
        </div>
        <div class="ef"><label>Gender</label>
          <select id="ef_gender">
            <option value="">Select</option>
            <option value="Male" ${f.gender === "Male" ? "selected" : ""}>Male</option>
            <option value="Female" ${f.gender === "Female" ? "selected" : ""}>Female</option>
          </select>
        </div>
        ${ef("Last Name", "ef_last_name", f.last_name || d.last_name || "")}
        ${ef("First Name", "ef_first_name", f.first_name || d.first_name || "")}
        ${ef("Middle Name", "ef_middle_name", f.middle_name || "")}
        ${ef("Birthdate", "ef_birthdate", f.birthdate || "", "date")}
        ${ef("Age", "ef_age", f.age || "", "number")}
        ${ef("Religion", "ef_religion", f.religion || "")}
        ${ef("Dependents", "ef_dependents", f.dependents || "", "number")}
        <div class="ef"><label>Civil Status</label>
          <select id="ef_civil_status">
            <option value="">Select</option>
            ${["Single", "Married", "Widower", "Separated"].map(s => `<option value="${s}" ${f.civil_status === s ? "selected" : ""}>${s}</option>`).join("")}
          </select>
        </div>
        ${ef("Educational Attainment", "ef_education", f.education || "")}
        ${ef("Livelihood / Occupation", "ef_livelihood", f.livelihood || "")}
        ${ef("Gross Monthly Income", "ef_gross_monthly_income", f.gross_monthly_income || "", "number")}
        <div class="ef full">${ef("Home Address (Complete)", "ef_home_address", f.home_address || "")}</div>
      </div>

      <!-- CONTACT & WORK -->
      <div class="edit-section">Contact & Work Information</div>
      <div class="edit-grid">
        ${ef("Mobile No.", "ef_mobile", f.mobile || d.phone || "")}
        ${ef("Telephone", "ef_telephone", f.telephone || "")}
        ${ef("Email Address", "ef_email", f.email || d.email || "")}
        ${ef("TIN", "ef_tin", f.tin || "")}
        <div class="ef full">${ef("Work Address (Complete)", "ef_work_address", f.work_address || "")}</div>
        ${ef("Facebook Profile Link", "ef_facebook_link", f.facebook_link || "")}
        ${ef("OFW Country", "ef_ofw_country", f.ofw_country || "")}
        ${ef("OFW Work Abroad", "ef_ofw_work", f.ofw_work || "")}
        ${ef("No. of Years Working Abroad", "ef_ofw_years", f.ofw_years || "", "number")}
      </div>

      <!-- FAMILY -->
      <div class="edit-section">Family Information</div>
      <div class="edit-grid">
        ${ef("Spouse Name", "ef_spouse_name", f.spouse_name || "")}
        ${ef("Spouse Occupation", "ef_spouse_occupation", f.spouse_occupation || "")}
        ${ef("Spouse Company", "ef_spouse_company", f.spouse_company || "")}
        ${ef("Father's Name", "ef_father_name", f.father_name || "")}
        ${ef("Father's Occupation", "ef_father_occupation", f.father_occupation || "")}
        ${ef("Mother's Name", "ef_mother_name", f.mother_name || "")}
        ${ef("Mother's Occupation", "ef_mother_occupation", f.mother_occupation || "")}
      </div>

      <!-- BENEFICIARIES -->
      <div class="edit-section">Beneficiaries</div>
      <div class="edit-grid">

    function ef(label, id, value, type) {
      type = type || "text";
      return `<div class="ef"><label>${label}</label><input type="${type}" id="${id}" value="${esc(String(value || ""))}" /></div>`;
    }

    async function submitEdit() {
      const fields = [
        "application_type", "last_name", "first_name", "middle_name", "gender",
        "birthdate", "age", "religion", "dependents", "civil_status", "education",
        "livelihood", "gross_monthly_income", "home_address", "mobile", "telephone",
        "email", "tin", "work_address", "ofw_country", "ofw_work", "ofw_years",
        "spouse_name", "spouse_occupation", "spouse_company",
        "father_name", "father_occupation", "mother_name", "mother_occupation",
        "benef_name_1", "benef_relation_1", "benef_alloc_1", "benef_contact_1",
        "benef_name_2", "benef_relation_2", "benef_alloc_2", "benef_contact_2",
        "benef_name_3", "benef_relation_3", "benef_alloc_3", "benef_contact_3",
        "benef_name_4", "benef_relation_4", "benef_alloc_4", "benef_contact_4",
        "avail_feeds", "using_feeds_now", "feeds_brand", "avail_loans",
        "avail_savings", "avail_time_deposit",
        "baboy_sow", "baboy_piglet", "baboy_boar", "baboy_grower",
        "manok_patilugin", "manok_broiler", "iba_pang_alaga",
        "signature", "signature_file", "signature_date",
        "subscription_agreement_accepted", "kasunduan_accepted", "facebook_link"
      ];

      const body = { id: currentEditId };
      fields.forEach(f => {
        const el = document.getElementById("ef_" + f);
        if (el) body[f] = el.value;
      });
      // agreement flags are stored as-is from form_data, not editable via text input


      const r = await post("api/admin_applications.php?action=edit", body);
      const data = await r.json();

      if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
      closeModal("editModal");
      showAlert("Application updated successfully.", "success");
      loadApplications();
    }

    // ── DELETE ──────────────────────────────────────────────
    async function deleteApp(id) {
      if (!confirm("Delete this application permanently? This cannot be undone.")) return;
      const r = await post("api/admin_applications.php?action=delete", { id });
      const data = await r.json();
      if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
      showAlert("Application deleted.", "success");
      loadApplications();
    }

    // ── HELPERS ─────────────────────────────────────────────
    function openModal(id) { document.getElementById(id).classList.add("open"); }
    function closeModal(id) { document.getElementById(id).classList.remove("open"); }

    function post(url, body) {
      return fetch(url, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
    }

    function showAlert(msg, type) {
      const box = document.getElementById("alertBox");
      box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => box.innerHTML = "", 3500);
    }

    function esc(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    async function adminLogout() {
      if (!confirm("Logout?")) return;
      await fetch("api/admin_logout.php", { method: "POST", credentials: "include" });
      window.location.href = "login.html";
    }

    // Allow pressing Enter in search
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("searchInput").addEventListener("keydown", e => {
        if (e.key === "Enter") loadApplications();
      });
      document.getElementById("statusFilter").addEventListener("change", loadApplications);
    });
    </script>
  </body>
