<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | LIMCOMA</title>
  <link rel="shortcut icon" href="../images/limcoma logoo.png" type="image/x-icon" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a3a5c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .login-header {
      background: #15355a;
      color: #fff;
      text-align: center;
      padding: 28px 20px;
    }

    .login-header img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .login-header h1 {
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .login-header p {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .login-body {
      padding: 28px 30px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #15355a; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #15355a;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .btn-login:hover { background: #1a4070; }

    .msg {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: bold;
      display: none;
    }

    .msg.err { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    .msg.ok  { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }

    .login-footer {
      text-align: center;
      padding: 12px;
      font-size: 0.8rem;
      color: #666;
      border-top: 1px solid #eee;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.85rem;
      color: #15355a;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-header">
    <img src="../images/limcoma logoo.png" alt="LIMCOMA Logo" />
    <h1>LIMCOMA ADMIN</h1>
    <p>Administrator Panel Login</p>
  </div>

  <div class="login-body">
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" autocomplete="username" required placeholder="Enter username" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required placeholder="Enter password" />
      </div>

      <button type="submit" class="btn-login">Sign In</button>

      <div id="msgOk"  class="msg ok">Login successful. Redirecting...</div>
      <div id="msgErr" class="msg err">Invalid username or password.</div>
    </form>

    <a href="../index.html" class="back-link">← Back to Main Site</a>
  </div>

  <div class="login-footer">
    © LIMCOMA MULTI-PURPOSE COOPERATIVE &nbsp;|&nbsp; Admin Panel
  </div>
</div>

<script>
  // If already logged in, redirect to dashboard
  (async function () {
    try {
      const r = await fetch("api/admin_me.php", { credentials: "include" });
      const d = await r.json();
      if (d.ok) window.location.href = "dashboard.html";
    } catch (e) {}
  })();

  document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    const ok  = document.getElementById("msgOk");
    const err = document.getElementById("msgErr");
    ok.style.display = "none";
    err.style.display = "none";

    const body = {
      username: document.getElementById("username").value.trim(),
      password: document.getElementById("password").value
    };

    try {
      const res  = await fetch("api/admin_login.php", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json();

      if (!data.ok) {
        err.style.display = "block";
        return;
      }

      ok.style.display = "block";
      setTimeout(() => window.location.href = "dashboard.html", 600);

    } catch (ex) {
      err.textContent = "Server error. Please try again.";
      err.style.display = "block";
    }
  });
</script>

</body>
</html>
