<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users | LIMCOMA Admin</title>
    <link rel="shortcut icon" href="../images/limcoma logoo.png" type="image/x-icon" />
    <link rel="stylesheet" href="admin.css" />
</head>

<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-brand">
            <img src="../images/limcoma logoo.png" alt="Logo" /> LIMCOMA Admin Panel
        </div>
        <div class="topbar-right">
            <span id="adminName">Admin</span>
            <button class="btn-logout" onclick="adminLogout()">Logout</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-section">Main</div>
        <a href="dashboard.html"><span class="ico">&#9632;</span> Dashboard</a>
        <a href="applications.html"><span class="ico">&#128196;</span> Applications</a>
        <a href="users.html" class="active"><span class="ico">&#128100;</span> Users</a>
        <div class="sidebar-section admin-only" style="display:none;">Admin</div>
        <a href="subadmins.html" class="admin-only" style="display:none;"><span class="ico">&#128272;</span> Admin Accounts</a>
        <div class="sidebar-section">Site</div>
        <a href="../index.html" target="_blank"><span class="ico">&#127760;</span> Main Site</a>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="page-title">Registered Users</div>

        <div class="toolbar no-print">
            <input type="text" id="searchInput" placeholder="Search by name or email..." style="min-width:220px;" />
            <button class="btn btn-primary" onclick="loadUsers()">Search</button>
            <button class="btn btn-secondary" onclick="loadUsers()">Refresh</button>
        </div>

        <div id="alertBox"></div>

        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Registered</th>
                            <th style="min-width:200px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTbody">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:20px;color:#888;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ── EDIT USER MODAL ────────────────────────────────────── -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box" style="max-width:500px;">
            <div class="modal-header">
                <span>Edit User</span>
                <button class="modal-close" onclick="closeModal('editModal')">&#x2715;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId" />
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="editFirst" class="form-control" />
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="editLast" class="form-control" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail" class="form-control" />
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="editPhone" class="form-control" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('editModal')">Cancel</button>
                <button class="btn btn-primary" onclick="submitEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        let currentRole = "";

        (async function init() {
            const me = await (await fetch("api/admin_me.php", {
                credentials: "include"
            })).json();
            if (!me.ok) {
                window.location.href = "login.html";
                return;
            }

            currentRole = me.role;
            document.getElementById("adminName").textContent = me.username + " (" + me.role + ")";

            if (me.role === "admin") {
                document.querySelectorAll(".admin-only").forEach(el => el.style.display = "");
            }

            loadUsers();
        })();

        async function loadUsers() {
            const search = document.getElementById("searchInput").value.trim();
            let url = "api/admin_users.php?action=list";
            if (search) url += "&search=" + encodeURIComponent(search);

            const r = await fetch(url, {
                credentials: "include"
            });
            const data = await r.json();
            const tbody = document.getElementById("userTbody");

            if (!data.ok || !data.data.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:#888;">No users found.</td></tr>';
                return;
            }

            tbody.innerHTML = data.data.map((u, index) => `
      <tr>
        <td>${index + 1}</td>
        <td>${esc(u.first_name||"")} ${esc(u.last_name||"")}</td>
        <td>${esc(u.email||"")}</td>
        <td>${esc(u.phone||"")}</td>
        <td><span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
        <td>${u.created_at ? u.created_at.slice(0,10) : ""}</td>
        <td>
          <button class="btn btn-primary btn-sm" onclick="openEdit(${u.id},'${esc(u.first_name||"")}','${esc(u.last_name||"")}','${esc(u.email||"")}','${esc(u.phone||"")}')">Edit</button>
          <a href="applications.html" class="btn btn-info btn-sm">Applications</a>
          ${currentRole === "admin" ? `
            <button class="btn btn-sm ${u.is_active ? 'btn-warning' : 'btn-success'}" onclick="toggleActive(${u.id}, ${u.is_active ? 0 : 1})">${u.is_active ? 'Disable' : 'Activate'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Delete</button>
          ` : ""}
        </td>
      </tr>
    `).join("");
  }

  function openEdit(id, first, last, email, phone) {
    document.getElementById("editUserId").value = id;
    document.getElementById("editFirst").value  = first;
    document.getElementById("editLast").value   = last;
    document.getElementById("editEmail").value  = email;
    document.getElementById("editPhone").value  = phone;
    openModal("editModal");
  }

  async function submitEdit() {
    const id    = parseInt(document.getElementById("editUserId").value);
    const body  = {
      id,
      first_name: document.getElementById("editFirst").value,
      last_name:  document.getElementById("editLast").value,
      email:      document.getElementById("editEmail").value,
      phone:      document.getElementById("editPhone").value,
    };

    const r    = await post("api/admin_users.php?action=edit", body);
    const data = await r.json();

    if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
    closeModal("editModal");
    showAlert("User updated successfully.", "success");
    loadUsers();
  }

  async function toggleActive(id, newState) {
    const label = newState ? "activate" : "disable";
    if (!confirm("Are you sure you want to " + label + " this user account?")) return;
    const r    = await post("api/admin_users.php?action=toggle_active", { id, is_active: newState });
    const data = await r.json();
    if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
    showAlert("User account " + (newState ? "activated" : "disabled") + ".", "success");
    loadUsers();
  }

  async function deleteUser(id) {
    if (!confirm("Delete this user and all their applications? This cannot be undone.")) return;
    const r    = await post("api/admin_users.php?action=delete", { id });
    const data = await r.json();
    if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
    showAlert("User deleted.", "success");
    loadUsers();
  }

  function openModal(id)  { document.getElementById(id).classList.add("open"); }
  function closeModal(id) { document.getElementById(id).classList.remove("open"); }

  function post(url, body) {
    return fetch(url, {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  }

  function showAlert(msg, type) {
    const box = document.getElementById("alertBox");
    box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => box.innerHTML = "", 3500);
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  async function adminLogout() {
    if (!confirm("Logout?")) return;
    await fetch("api/admin_logout.php", { method: "POST", credentials: "include" });
    window.location.href = "login.html";
  }

  document.getElementById("searchInput").addEventListener("keydown", e => {
    if (e.key === "Enter") loadUsers();
  });
    </script>
</body>

</html>
